<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Mewoot | Registration</title>
        <link href="/styles/styles.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    </head>
    <body>
        <div class="bg-design">
            <div class="blob-1"></div>
            <div class="blob-2"></div>
            <div class="streak"></div>
            <div class="streak-thin"></div>
        </div>
        <nav>
            <div class="mockup-branding-name">MeWoot
                <div class="mockup-branding-logo">
                    <span>📦</span>
                </div>
            </div>
        </nav>
        <div class="register-center-page">
            <div class="register-form">
                <h2 class="register-form-heading">Create Account</h2>
                <p class="register-form-description">Become a part of MeWoot!</p>
                <div class="alert" id="alert"></div>
                <form id="registration">
                    <div class="name-credentials active" id="first-page">
                        <div class="field-first-name">
                            <label for="firstname">First Name</label>
                            <input id="firstname" type="text" placeholder="Kenth Jarren" required>
                        </div>
                        <div class="field-middle-name">
                            <label for="middlename">Middle Name</label>
                            <input id="middlename" type="text" placeholder="Samonte">
                        </div>
                        <div class="field-last-name">
                            <label for="lastname">Last Name</label>
                            <input id="lastname" type="text" placeholder="Mariano" required>
                        </div>
                        <button class="next-btn" type="button" id="nextBtn">Next</button>
                    </div>
                    <div class="next-credentials" id="second-page">
                        <div class="field-email">
                            <label for="email">Email Address</label>
                            <input id="email" type="email" placeholder="name@company.com" required>
                        </div>
                        <div class="field-password">
                            <label for="password">Password</label>
                            <input id="password" type="password" placeholder="*********" required>
                        </div>
                        <div class="field-pw-confirmation">
                            <label for="confirm">Confirm Password</label>
                            <input id="confirm-password" type="password" placeholder="*********" required>
                        </div>
                        <button class="back-btn" type="button" id="backBtn">Go Back</button>
                        <button class="register-btn" type="submit">Register</button>
                    </div>
                </form>
                <div class="new-user">
                    Already have an account at MeWoot? <a href="login.html">Log in</a>
                </div>
            </div>
        </div>
    </body>
    <script src="/script/registration.js"></script>
</html>
